#====================================#
#=========== BASE SETTING ===========#
baseURL                         = 'https://github-name.github.io/'
languageCode                    = 'id'
title                           = 'Site Title'
# theme                           = "belajar"
enableEmoji                     = true
capitalizeListTitles            = false
disableAliases                  = false

#====================================#
#========== PARAMS SETTING ==========#
[params]
  description   = "Deskripsi Disini"
  keywords      = ["notes"]
  shortTitle    = "Notes"
  author        = "John Doe"
  logo          = "logo/logo.png"
  image         = "logo/logo.png"
  twitter       = "@johndoe"
  toc           = false

[permalinks]
  notes         = "/:sections/:year/:month/:title/"
  projects      = "/:sections/:year/:month/:title/"
  reference     = "/:sections/:year/:month/:title/"
  resources     = "/:sections/:year/:month/:title/"
  daily         = "/:sections/:year/:month/:title/"

#====================================#
#======== TAXONOMIES SETTING ========#
[taxonomies]
  category  = "categories"
  tag       = "tags"
  status    = "status"
  topic     = "topics"
  context   = "contexts"

#====================================#
#============== MARKUP ==============#
[markup]
  [markup.tableOfContents]
    endLevel    = 6
    ordered     = false
    startLevel  = 2

  [markup.highlight]
    codeFences          = false
    guessSyntax         = false
    style               = "github-dark"
    noClasses           = false
    lineNumbersInTable  = false
    lineNos             = false
    anchorLineNos       = false
    lineAnchors         = ''
    lineNoStart         = 1
    tabWidth            = 4

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe    = true

    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      
      [markup.goldmark.parser.attribute]
        block = true
        title = true
#====================================#
#============== OUTPUT ==============#
[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]

  [outputFormats.search]
    mediaType       = "application/json"
    baseName        = "search"
    isPlainText     = true
    notAlternative  = true
    
  [outputFormats.manifest]
    mediaType       = "application/json"
    baseName        = "manifest"
    isPlainText     = true
    notAlternative  = true
  
  [outputFormats.news]
    mediaType       = "application/json"
    baseName        = "news"
    isPlainText     = true
    notAlternative  = true

  [outputFormats.sw]
    mediaType       = "text/javascript"
    baseName        = "sw"
    isPlainText     = true
    notAlternative  = true


[outputs]
  home = ["HTML", "search", "manifest", 'rss', 'news', 'sw']
  section = ['html', 'rss']
  
[services]
  [services.rss]
    limit = 42

#====================================#
#============== MODULE ==============#
[module]
  [module.hugoVersion]
    extended = true
    min = "0.145.0"

#====================================#
#============== CACHES ==============#
[caches]
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = -1