{{- $page := . }}

{{- range $taxonomyName, $taxonomy := site.Taxonomies }}
  {{- with $page.GetTerms $taxonomyName }}
    {{- $label := (index . 0).Parent.LinkTitle }}
    <strong class="meta__label">{{ $label | title }}</strong>
    <div class="meta__value meta__value--term">
      {{- range . }}
        <a href="{{ .RelPermalink }}" class="u-flex-center meta__link">{{ .Data.Term }}</a>
      {{- end }}
    </div>
  {{- end }}
{{- end }}
