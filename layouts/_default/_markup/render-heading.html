<h{{ .Level }} id="{{ .Anchor }}" {{- with .Attributes.class }} class="heading {{ . }}" {{- else }} class="heading" {{- end }}>
  {{ .Text }}
  <a href="#{{ .Anchor }}" class="heading__anchor" aria-label="{{ .Text }}" title="{{ .Text }}">
    {{ partial "icons" "icon--hashtag" }}
  </a>
</h{{ .Level }}>
