{% assign tags = site.tags %}
{% for tag in tags %}
<nav>
    <button>{{ tag[0] }}</button>
        <div>
            <ul>
            {% for post in tag[1] %}
                <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
            {% endfor %}
        </ul>
    </div>
</nav>
{% endfor %}
