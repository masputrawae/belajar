<header class="post__header">
    <h1>{{ page.title }}</h1>
    <p>
        <span>{{ page.description }}</span><br>
        <span><strong>Publish on:</strong> {{ page.date | date: "%d %B %Y" }} by {{ site.author }}</span><br>
        {% if page.last_modified_at %}
        <span><strong>Last modified at:</strong> {{ page.last_modified_at | date: "%d %B %Y" }}</span><br>
        {% endif %}
        {% if page.image %}
    </p>
    <img src="{{ page.image }}" alt="{{ page.title }}">
    {% endif %}
    <img src="https://picsum.photos/320/150" alt="{{ page.title }}">
</header>
