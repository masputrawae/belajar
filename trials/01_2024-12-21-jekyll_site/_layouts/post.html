---
layout: default
---
<main class="layout__main main-post">
    <article class="post">
        <header class="post-header">
            <h1>{{ post.title }}</h1>
            <p class="post--info">
                <span>Author: {{ post.author }}</span><br>
                <span>Publish on: {{ post.date }}</span><br>
            </p>
        </header>
        
        <section class="post-main">
            <div class="toc">
                <a class="btn btn-toc">
                    Daftar Isi:
                </a>
                <div class="toc-list">
                    {% include tools/toc.html html=content %}
                </div>
            </div>
            {{ content }}
        </section>
        
        <footer class="post-footer">
            <p class="post--info">
                <span>Last Modified: {{ post.last_modified_at }}</span><br>
                <span>Categories: {{ post.categories }}</span><br>
                <span>Tags: {{ post.tags }}</span><br>
            </p>
        </footer>
    </article>
</main>
