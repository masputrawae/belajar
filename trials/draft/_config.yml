# ===============[] Base Setting
title: ""
description: ""
logo: /assets/images/logo/logo.png
author: ""
slogan: ""

url: ""
baseurl: ""

lang: "id"
timezone: Asia/Jakarta

# ===============[] 
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: "/:title/"
      toc: true

collections:
  projects:
    output: true
  pages:
    output: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - drafts
  - .sass-cache/
  - .jekyll-cache/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

highlighter: rouge
markdown: kramdown
kramdown: 
  syntax_highlighter_opts:
    disable : true

# ============[]