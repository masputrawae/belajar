#====================================#
#=========== BASE SETTING ===========#
baseURL                         = 'https://masputrawae.github.io/belajar/'
languageCode                    = 'id'
title                           = 'My Notes'
cascade.keywords                = ["notes", "other"]
cascade.description             = "Site Description"
enableEmoji                     = true
capitalizeListTitles            = false
disableAliases                  = false

#====================================#
#========== PARAMS SETTING ==========#
[params]
  author        = "John Doe"
  logo          = "logo/logo.webp"
  twitter       = "@johndoe"
  toc           = true

[permalinks]
  posts = "/:sections/:year/:month/:title/"

#====================================#
#======== TAXONOMIES SETTING ========#
[taxonomies]
  category  = "categories"
  tag       = "tags"
  status    = "status"
  group     = "grouping"
  series    = "series"

#====================================#
#============== MARKUP ==============#
[markup]
  [markup.tableOfContents]
    endLevel    = 6
    ordered     = false
    startLevel  = 2

  [markup.highlight]
    codeFences          = false
    guessSyntax         = false
    style               = "github-dark"
    noClasses           = false
    lineNumbersInTable  = false
    lineNos             = false
    anchorLineNos       = false
    lineAnchors         = ''
    lineNoStart         = 1
    tabWidth            = 4

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe    = true

    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      
      [markup.goldmark.parser.attribute]
        block = true
        title = true
#====================================#
#============== OUTPUT ==============#
[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]

  [outputFormats.search]
    mediaType       = "application/json"
    baseName        = "search"
    isPlainText     = true
    notAlternative  = true
    
  [outputFormats.manifest]
    mediaType       = "application/json"
    baseName        = "manifest"
    isPlainText     = true
    notAlternative  = true

[outputs]
  home = ["HTML", "search", "manifest", 'rss']
  section = ['html', 'rss']
  
[services]
  [services.rss]
    limit = 42

#====================================#
#============== MODULE ==============#
[module]
  [module.hugoVersion]
    extended = true
    min = "0.145.0"
