<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Percobaan Dashboard</title>
</head>
<style>
.desktop {display: none;}
@media (min-width: 500px){
    .desktop {display: block;}
}
</style>
<body>
    <!-- START : CONTAINER -->
    <div class="container">
        <!-- START : HEADER -->
        <header>
            <h1>DashBoard</h1>
            <form class="desktop">
                <input type="search">
                <button>🔎</button>
            </form>
            <nav>
                <button>🔎</button>
                <button>💡</button>
                <button>👤</button>
            </nav>
        </header>
        <!-- END : HEADER -->
        
        <!-- START : MAIN CONTAINER -->
        <div class="main-container">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="header-sidebar">
                    <img src="https://picsum.photos/100" alt="logo">
                    <h2>Putra Jaya</h2>
                    <nav>
                        <button>➕</button>
                        <button>🖼️</button>
                        <button>🏠</button>
                        <button>🔄</button>
                        <button>📥</button>
                    </nav>
                </div>
                <nav>
                    <h3>Main Menu</h3>
                    <ul>
                        <li><a href="">Notes</a></li>
                        <li><a href="">Recent Change</a></li>
                        <li><a href="">Last Modified</a></li>
                        <li><a href="">Categories</a></li>
                        <li><a href="">Tags</a></li>
                        <li><a href="">Archives</a></li>
                    </ul>
                </nav>
            </aside>
            
            <!-- Main -->
            <main>
                Content
            </main>
        </div>
        <!-- END : MAIN CONTAINER -->
        
        <footer>
            <p>&copy; 2024 - Putra Jaya | My Notes | Semua hak cipta dilindungi</p>
        </footer>
    </div>
    <!-- END : CONTAINER -->
    <button>➡️</button>
</body>
</html>
