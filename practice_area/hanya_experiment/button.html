<!DOCTYPE html>
<html lang="in">
<head>
    <meta charset="UTF-8">
    <title>Button</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            margin: 5rem;
        }
        button {
            border-radius: 5px;
            padding: 5px 10px;
            box-shadow: 2px 3px 5px 1px rgba(0,0,0,0.3);
            transition: all 50ms ease;
            font-size: 35px;
            
        }
        button:hover{
            transform: scale(1.2);
            box-shadow: 1px 1px 2px 0px rgba(0,0,0,0.8),inset 0px 0px 1px 0px rgba(0,0,0,0.8);
        }
        
        button:active{
            transform: scale(0.9);
            box-shadow: inset 0px 0px 1px 1px rgba(0,0,0,0.1),inset 0px 0px 10px 1px rgba(0,0,0,0.3),0px 0px 0px 0px rgba(0,0,0,0.1);
        }                        
    </style>
</head>
<body>
    <button><i class="bi-list"></i></button>
    <button><i class="bi-clock"></i></button>
    <button><i class="bi-house"></i></button>
</body>
</html>
