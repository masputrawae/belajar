<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Judul halaman</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="reset.css">
    
    

<style>
body {
    margin: 5rem;
    background-color: #1A1A1A;
}

button {
    border-radius: 10px;
    padding: 10px 15px;
    box-shadow:
        5px 5px 10px 1px rgba(0,0,0,0.1),
        -5px -5px 10px 1px rgba(0,0,0,0.1),
        inset 0px 0px 1px 1px #dc7600;
        
    color: #dc7600;
    transition: all 0.1s ease;
    transform: scale(1.05)
}
button:hover {
    transform: scale(1);
    box-shadow:
        5px 5px 20px 1px rgba(0,0,0,0.1),
        -5px -5px 30px 1px rgba(0,0,0,0.1),
        inset 0px 0px 1px 1px #a27100;
        
    color: #a27100;
}

button:active {
    transform: scale(0.95);
    box-shadow:
        1px 1px 1px 1px rgba(0,0,0,0.1),
        -1px -1px 1px 1px rgba(0,0,0,0.1),
        inset 0px 0px 1px 1px #0082dc;
        
    color: #0082dc;
}

i {font-size: 18px;}
</style>
</head>
<body>
    <button><i class="bi-list"></i></button>
    <button><i class="bi-house"></i></button>
    <button><i class="bi-search"></i></button>
</body>
</html>
